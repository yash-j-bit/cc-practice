name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck "Day 1-hn-summary/hn-top10.sh" \
                     "Day 1-hn-summary/hn-summary.sh" \
                     "Day 1-hn-summary/test.sh"

  test:
    name: Script Tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq curl

      - name: Run tests
        run: |
          cd "Day 1-hn-summary"
          chmod +x hn-top10.sh hn-summary.sh test.sh
          ./test.sh
        env:
          # Skip AI-dependent tests in CI by using --format json only
          CI: "true"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: CI failed on `${{ github.repository }}` — branch `${{ github.ref_name }}`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
